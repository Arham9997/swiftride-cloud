<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking History — SwiftRide Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/search.css">
</head>
<body>

<div class="dash-shell">
  <div id="sr-dash-sidebar-mount"></div>

  <main class="dash-main">
    <div class="dash-topbar">
      <div><h1>Booking History</h1><div class="sub">All your trips, past and upcoming, in one place.</div></div>
    </div>

    <div class="flex" style="gap:10px; margin-bottom:20px;">
      <button class="sort-pill active" data-filter="all">All</button>
      <button class="sort-pill" data-filter="upcoming">Upcoming</button>
      <button class="sort-pill" data-filter="completed">Completed</button>
      <button class="sort-pill" data-filter="cancelled">Cancelled</button>
    </div>

    <div id="historyList"></div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/app.js"></script>
<script>
  const session = srRequireAuth();
  if (session) {
    srRenderDashSidebar(session.role === 'admin' ? 'admin' : session.role === 'operator' ? 'operator' : 'passenger', "history");

    let bookings = srGetBookings();
    if (!bookings.length) {
      const d1 = generateBuses("Mumbai","Pune", new Date(Date.now()+86400000*3).toISOString().split("T")[0])[0];
      const d2 = generateBuses("Bengaluru","Chennai", new Date(Date.now()-86400000*5).toISOString().split("T")[0])[0];
      bookings = [
        { id: srGenerateBookingId(), status:"confirmed", bus:d1, source:"Mumbai", destination:"Pune", date:new Date(Date.now()+86400000*3).toISOString().split("T")[0], seats:["A4"], fare:{total:d1.fare+40}, demo:true },
        { id: srGenerateBookingId(), status:"confirmed", bus:d2, source:"Bengaluru", destination:"Chennai", date:new Date(Date.now()-86400000*5).toISOString().split("T")[0], seats:["B2","B3"], fare:{total:d2.fare*2+60}, demo:true }
      ];
    }
    const today = new Date().toISOString().split("T")[0];

    function statusOf(b) {
      if (b.status === "cancelled") return "cancelled";
      return b.date >= today ? "upcoming" : "completed";
    }

    function render(filter) {
      const filtered = filter === "all" ? bookings : bookings.filter(b => statusOf(b) === filter);
      const list = document.getElementById("historyList");
      if (!filtered.length) {
        list.innerHTML = `<div class="dash-panel" style="text-align:center; padding:50px;"><i class="fa-solid fa-ticket" style="font-size:30px; color:var(--ink-300);"></i><h3 style="margin-top:14px; font-size:16px;">No bookings here</h3><p class="text-muted" style="font-size:13.5px; margin-top:6px;">Trips matching this filter will show up here.</p></div>`;
        return;
      }
      list.innerHTML = filtered.map(b => {
        const st = statusOf(b);
        const badgeClass = st === "upcoming" ? "badge-success" : st === "cancelled" ? "badge-danger" : "badge-navy";
        return `
        <div class="dash-panel" style="margin-bottom:16px;">
          <div class="flex-between" style="flex-wrap:wrap; gap:12px;">
            <div class="flex" style="gap:14px; align-items:center;">
              <div class="trip-icon"><i class="fa-solid fa-bus"></i></div>
              <div>
                <div class="route-txt" style="color:var(--ink-900);">${b.source} → ${b.destination}</div>
                <div class="meta-txt">${b.bus.operator} · ${b.bus.type} · ${new Date(b.date+"T00:00").toLocaleDateString("en-IN",{day:'numeric',month:'short',year:'numeric'})}</div>
              </div>
            </div>
            <span class="badge ${badgeClass}">${st.charAt(0).toUpperCase()+st.slice(1)}</span>
          </div>
          <div class="flex-between" style="margin-top:18px; flex-wrap:wrap; gap:12px;">
            <div class="flex" style="gap:24px; font-size:13px; color:var(--ink-700);">
              <span><i class="fa-regular fa-clock" style="margin-right:6px;"></i>${b.bus.depTime} – ${b.bus.arrTime}</span>
              <span class="mono"><i class="fa-solid fa-chair" style="margin-right:6px;"></i>${b.seats.join(", ")}</span>
              <span class="mono" style="font-weight:700; color:var(--orange-600);">${srFormatCurrency(b.fare.total)}</span>
            </div>
            <div class="flex" style="gap:8px;">
              ${st === "upcoming" ? `<button class="btn btn-outline btn-sm cancel-btn" data-id="${b.id}">Cancel</button><a href="booking-confirmation.html" class="btn btn-primary btn-sm">View Ticket</a>` : ''}
              ${st === "completed" ? `<button class="btn btn-outline btn-sm">Download Invoice</button>` : ''}
              ${st === "cancelled" ? `<span class="text-muted" style="font-size:12.5px;">Refund processed</span>` : ''}
            </div>
          </div>
        </div>`;
      }).join("");

      list.querySelectorAll(".cancel-btn").forEach(btn => btn.addEventListener("click", () => {
        const id = btn.dataset.id;
        const b = bookings.find(x => x.id === id);
        if (b) { b.status = "cancelled"; if (!b.demo) srSaveBooking(b); srToast("Booking cancelled. Refund will be processed in 3-5 days.", "success"); render(document.querySelector(".sort-pill.active").dataset.filter); }
      }));
    }

    document.querySelectorAll(".sort-pill").forEach(p => p.addEventListener("click", () => {
      document.querySelectorAll(".sort-pill").forEach(x => x.classList.remove("active"));
      p.classList.add("active");
      render(p.dataset.filter);
    }));

    render("all");
  }
</script>
</body>
</html>
