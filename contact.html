<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — SwiftRide Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body>

<div id="sr-navbar-mount"></div>

<header class="page-hero">
  <div class="container">
    <h1>We're here to help</h1>
    <p>Reach out about bookings, partnerships, or anything else. Our support team typically replies within minutes.</p>
  </div>
</header>

<section class="section">
  <div class="container">
    <div class="contact-layout reveal">
      <div class="contact-info-card">
        <h3 style="color:white; font-size:18px; margin-bottom:24px;">Get in touch</h3>
        <div class="contact-info-row"><i class="fa-solid fa-location-dot"></i><div><div style="font-weight:600;">Office</div><div style="font-size:13px; opacity:.7; margin-top:3px;">Cloud Tower, BKC, Mumbai 400051</div></div></div>
        <div class="contact-info-row"><i class="fa-solid fa-phone"></i><div><div style="font-weight:600;">Phone</div><div style="font-size:13px; opacity:.7; margin-top:3px;">+91 22 4000 1234</div></div></div>
        <div class="contact-info-row"><i class="fa-solid fa-envelope"></i><div><div style="font-weight:600;">Email</div><div style="font-size:13px; opacity:.7; margin-top:3px;">support@swiftridecloud.app</div></div></div>
        <div class="contact-info-row"><i class="fa-solid fa-clock"></i><div><div style="font-weight:600;">Support Hours</div><div style="font-size:13px; opacity:.7; margin-top:3px;">24/7, every day of the week</div></div></div>
        <div class="footer-socials" style="margin-top:30px;">
          <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
          <a href="#" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
          <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
        </div>
      </div>

      <div class="contact-form-card">
        <h3 style="font-size:18px; margin-bottom:20px;">Send us a message</h3>
        <form id="contactForm">
          <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div class="field"><label>Full Name</label><input class="input" required></div>
            <div class="field"><label>Email Address</label><input type="email" class="input" required></div>
          </div>
          <div class="field"><label>Subject</label>
            <select class="input"><option>General Inquiry</option><option>Booking Issue</option><option>Refund Request</option><option>Operator Partnership</option><option>Feedback</option></select>
          </div>
          <div class="field"><label>Message</label><textarea class="input" rows="5" required placeholder="How can we help?"></textarea></div>
          <button type="submit" class="btn btn-primary btn-block">Send Message <i class="fa-solid fa-paper-plane"></i></button>
        </form>
      </div>
    </div>
  </div>
</section>

<div id="sr-footer-mount"></div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/app.js"></script>
<script>
  srRenderNavbar("contact");
  srRenderFooter();
  document.getElementById("contactForm").addEventListener("submit", (e) => {
    e.preventDefault();
    srToast("Message sent! We'll get back to you within minutes.", "success");
    e.target.reset();
  });
</script>
</body>
</html>
