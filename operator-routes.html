<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Routes — SwiftRide Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dash-shell">
  <div id="sr-dash-sidebar-mount"></div>

  <main class="dash-main">
    <div class="dash-topbar">
      <div><h1>Manage Routes</h1><div class="sub">Schedules and fares per route.</div></div>
      <button class="btn btn-primary" id="addRouteBtn"><i class="fa-solid fa-plus"></i> Add Route</button>
    </div>

    <div class="dash-panel" id="addRouteForm" style="display:none;">
      <h3 style="font-size:16px; margin-bottom:18px;">Add a new route</h3>
      <form id="routeForm">
        <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
          <div class="field"><label>Source</label><input class="input" id="rSource" list="citiesList" required></div>
          <div class="field"><label>Destination</label><input class="input" id="rDest" list="citiesList" required></div>
          <datalist id="citiesList"></datalist>
          <div class="field"><label>Departure Time</label><input type="time" class="input" id="rDepTime" required></div>
          <div class="field"><label>Duration (hrs)</label><input type="number" class="input" id="rDuration" value="5" required></div>
          <div class="field"><label>Assigned Bus</label><select class="input" id="rBus"></select></div>
          <div class="field"><label>Fare (₹)</label><input type="number" class="input" id="rFare" value="650" required></div>
        </div>
        <button type="submit" class="btn btn-primary">Save Route</button>
      </form>
    </div>

    <div class="dash-panel">
      <div class="table-wrap">
        <table class="dash-table">
          <thead><tr><th>Route</th><th>Departure</th><th>Duration</th><th>Bus</th><th>Fare</th><th>Actions</th></tr></thead>
          <tbody id="routesBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/app.js"></script>
<script>
  const session = srRequireAuth();
  if (session) {
    srRenderDashSidebar("operator", "routes");
    document.getElementById("citiesList").innerHTML = SR_CITIES.map(c => `<option value="${c}">`).join("");

    const fleet = JSON.parse(localStorage.getItem("sr_operator_buses") || "null") || [{number:"MH-12-AB-3456"},{number:"MH-14-CD-7821"}];
    document.getElementById("rBus").innerHTML = fleet.map(b => `<option>${b.number}</option>`).join("");

    let routes = JSON.parse(localStorage.getItem("sr_operator_routes") || "null") || [
      { source: "Mumbai", dest: "Pune", dep: "21:30", duration: 4, bus: "MH-12-AB-3456", fare: 890 },
      { source: "Mumbai", dest: "Goa", dep: "20:00", duration: 11, bus: "MH-12-EF-1190", fare: 1150 },
      { source: "Pune", dest: "Hyderabad", dep: "19:15", duration: 9, bus: "MH-14-CD-7821", fare: 980 },
    ];

    function save() { localStorage.setItem("sr_operator_routes", JSON.stringify(routes)); }

    function render() {
      document.getElementById("routesBody").innerHTML = routes.map((r,i) => `
        <tr>
          <td style="font-weight:700;">${r.source} → ${r.dest}</td>
          <td class="mono">${r.dep}</td>
          <td>${r.duration}h</td>
          <td class="mono">${r.bus}</td>
          <td class="mono">${srFormatCurrency(r.fare)}</td>
          <td><button class="btn btn-sm" style="background:rgba(226,72,58,0.1); color:var(--danger);" data-del="${i}">Remove</button></td>
        </tr>`).join("");

      document.querySelectorAll("[data-del]").forEach(btn => btn.addEventListener("click", () => {
        const i = parseInt(btn.dataset.del,10);
        routes.splice(i,1); save(); render();
        srToast("Route removed", "success");
      }));
    }
    render();

    document.getElementById("addRouteBtn").addEventListener("click", () => {
      const form = document.getElementById("addRouteForm");
      form.style.display = form.style.display === "none" ? "block" : "none";
    });

    document.getElementById("routeForm").addEventListener("submit", (e) => {
      e.preventDefault();
      routes.unshift({
        source: document.getElementById("rSource").value,
        dest: document.getElementById("rDest").value,
        dep: document.getElementById("rDepTime").value,
        duration: parseInt(document.getElementById("rDuration").value,10),
        bus: document.getElementById("rBus").value,
        fare: parseInt(document.getElementById("rFare").value,10)
      });
      save(); render();
      e.target.reset();
      document.getElementById("addRouteForm").style.display = "none";
      srToast("Route added successfully", "success");
    });
  }
</script>
</body>
</html>
