<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Route Management — SwiftRide Cloud Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dash-shell">
  <div id="sr-dash-sidebar-mount"></div>

  <main class="dash-main">
    <div class="dash-topbar"><div><h1>Route Management</h1><div class="sub">All active routes across the platform.</div></div></div>

    <div class="dash-panel">
      <div class="table-wrap">
        <table class="dash-table">
          <thead><tr><th>Route</th><th>Operators Serving</th><th>Avg. Fare</th><th>Daily Trips</th><th>Demand</th></tr></thead>
          <tbody id="routesBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/app.js"></script>
<script>
  const session = srRequireAuth();
  if (session) {
    srRenderDashSidebar("admin", "routes");

    const routes = [
      { route: "Mumbai → Pune", ops: 8, fare: 650, trips: 64, demand: "Very High" },
      { route: "Bengaluru → Chennai", ops: 6, fare: 720, trips: 48, demand: "High" },
      { route: "Delhi → Jaipur", ops: 5, fare: 540, trips: 42, demand: "High" },
      { route: "Hyderabad → Goa", ops: 4, fare: 1180, trips: 18, demand: "Medium" },
      { route: "Ahmedabad → Mumbai", ops: 7, fare: 480, trips: 56, demand: "High" },
      { route: "Chennai → Kochi", ops: 3, fare: 890, trips: 14, demand: "Medium" },
    ];
    const demandColor = { "Very High": "badge-danger", "High": "badge-orange", "Medium": "badge-sky" };
    document.getElementById("routesBody").innerHTML = routes.map(r => `
      <tr>
        <td style="font-weight:700;">${r.route}</td><td>${r.ops}</td>
        <td class="mono">${srFormatCurrency(r.fare)}</td><td>${r.trips}</td>
        <td><span class="badge ${demandColor[r.demand]}">${r.demand}</span></td>
      </tr>`).join("");
  }
</script>
</body>
</html>
