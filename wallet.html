<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet & Rewards — SwiftRide Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dash-shell">
  <div id="sr-dash-sidebar-mount"></div>

  <main class="dash-main">
    <div class="dash-topbar"><div><h1>Wallet & Rewards</h1><div class="sub">Track your balance, points, and reward tier.</div></div></div>

    <div class="grid" style="grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:24px;">
      <div class="wallet-card-visual">
        <div style="position:relative; z-index:1;">
          <div style="font-size:12.5px; opacity:.85;">SwiftRide Wallet Balance</div>
          <div style="font-family:var(--font-mono); font-size:34px; font-weight:700; margin-top:8px;">₹1,240.00</div>
          <div class="flex" style="gap:10px; margin-top:18px;">
            <button class="btn btn-secondary btn-sm" id="addMoneyBtn"><i class="fa-solid fa-plus"></i> Add Money</button>
            <button class="btn btn-secondary btn-sm">View Transactions</button>
          </div>
        </div>
      </div>
      <div class="dash-panel" style="margin-bottom:0;">
        <div class="flex-between">
          <div><h3 style="font-size:16px;"><i class="fa-solid fa-star text-orange"></i> Reward Points</h3><div class="text-muted" style="font-size:12.5px; margin-top:4px;">Gold Tier Member</div></div>
          <div class="mono" style="font-size:24px; font-weight:700; color:var(--orange-600);">680 pts</div>
        </div>
        <div class="reward-tier-bar"><div class="fill" style="width:68%;"></div></div>
        <div class="text-muted" style="font-size:12px;">320 more points to unlock Platinum Tier (free seat upgrades)</div>
      </div>
    </div>

    <div class="dash-panel">
      <div class="panel-head"><h3><i class="fa-solid fa-receipt text-orange"></i> Recent Transactions</h3></div>
      <div class="table-wrap">
        <table class="dash-table">
          <thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Amount</th></tr></thead>
          <tbody id="txnBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/app.js"></script>
<script>
  const session = srRequireAuth();
  if (session) {
    srRenderDashSidebar(session.role === 'admin' ? 'admin' : session.role === 'operator' ? 'operator' : 'passenger', "wallet");

    const txns = [
      { date: "Jun 24, 2026", desc: "Mumbai → Pune ticket booking", type: "Debit", amount: -890 },
      { date: "Jun 20, 2026", desc: "Wallet top-up via UPI", type: "Credit", amount: 1000 },
      { date: "Jun 12, 2026", desc: "Refund — Cancelled booking SRC44210193", type: "Credit", amount: 450 },
      { date: "Jun 02, 2026", desc: "Bengaluru → Chennai ticket booking", type: "Debit", amount: 620 },
      { date: "May 28, 2026", desc: "Referral bonus — Friend signed up", type: "Credit", amount: 100 },
    ];

    document.getElementById("txnBody").innerHTML = txns.map(t => `
      <tr>
        <td>${t.date}</td>
        <td>${t.desc}</td>
        <td><span class="badge ${t.amount > 0 ? 'badge-success' : 'badge-danger'}">${t.type}</span></td>
        <td class="mono" style="font-weight:700; color:${t.amount > 0 ? 'var(--success)' : 'var(--danger)'};">${t.amount > 0 ? '+' : ''}${srFormatCurrency(t.amount)}</td>
      </tr>`).join("");

    document.getElementById("addMoneyBtn").addEventListener("click", () => {
      srToast("Add money flow would open here (demo)", "info");
    });
  }
</script>
</body>
</html>
