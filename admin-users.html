<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Management — SwiftRide Cloud Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dash-shell">
  <div id="sr-dash-sidebar-mount"></div>

  <main class="dash-main">
    <div class="dash-topbar">
      <div><h1>User Management</h1><div class="sub">Manage passengers, operators, and admin accounts.</div></div>
      <div class="input-icon-wrap" style="width:240px;"><i class="fa-solid fa-magnifying-glass"></i><input class="input" id="searchInput" placeholder="Search by name or email"></div>
    </div>

    <div class="flex" style="gap:10px; margin-bottom:20px;">
      <button class="sort-pill active" data-role="all">All Users</button>
      <button class="sort-pill" data-role="passenger">Passengers</button>
      <button class="sort-pill" data-role="operator">Operators</button>
      <button class="sort-pill" data-role="admin">Admins</button>
    </div>

    <div class="dash-panel">
      <div class="table-wrap">
        <table class="dash-table">
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/app.js"></script>
<script>
  const session = srRequireAuth();
  if (session) {
    srRenderDashSidebar("admin", "users");

    let users = [
      { name: "Aarav Mehta", email: "aarav.mehta@email.com", role: "passenger", joined: "Jan 14, 2026", status: "active" },
      { name: "Priya Nair", email: "priya.nair@email.com", role: "passenger", joined: "Feb 02, 2026", status: "active" },
      { name: "NavyArc Coaches", email: "ops@navyarc.in", role: "operator", joined: "Nov 28, 2025", status: "active" },
      { name: "SkyHop Volvo", email: "admin@skyhop.in", role: "operator", joined: "Dec 10, 2025", status: "active" },
      { name: "Rohan Kulkarni", email: "rohan.k@email.com", role: "passenger", joined: "Mar 18, 2026", status: "suspended" },
      { name: "Admin User", email: "admin@swiftridecloud.app", role: "admin", joined: "Aug 01, 2025", status: "active" },
    ];

    function render(roleFilter, search) {
      let filtered = roleFilter === "all" ? users : users.filter(u => u.role === roleFilter);
      if (search) filtered = filtered.filter(u => u.name.toLowerCase().includes(search.toLowerCase()) || u.email.toLowerCase().includes(search.toLowerCase()));
      document.getElementById("usersBody").innerHTML = filtered.map((u,i) => `
        <tr>
          <td style="font-weight:700;">${u.name}</td><td>${u.email}</td>
          <td><span class="badge badge-navy" style="text-transform:capitalize;">${u.role}</span></td>
          <td>${u.joined}</td>
          <td><span class="badge ${u.status === 'active' ? 'badge-success' : 'badge-danger'}">${u.status}</span></td>
          <td><button class="btn btn-outline btn-sm toggle-status" data-name="${u.name}">${u.status === 'active' ? 'Suspend' : 'Reactivate'}</button></td>
        </tr>`).join("") || `<tr><td colspan="6" style="text-align:center; padding:30px; color:var(--ink-500);">No users found</td></tr>`;

      document.querySelectorAll(".toggle-status").forEach(btn => btn.addEventListener("click", () => {
        const u = users.find(x => x.name === btn.dataset.name);
        u.status = u.status === "active" ? "suspended" : "active";
        srToast(`${u.name} ${u.status === 'active' ? 'reactivated' : 'suspended'}`, "info");
        render(document.querySelector(".sort-pill.active").dataset.role, document.getElementById("searchInput").value);
      }));
    }
    render("all", "");

    document.querySelectorAll(".sort-pill").forEach(p => p.addEventListener("click", () => {
      document.querySelectorAll(".sort-pill").forEach(x => x.classList.remove("active"));
      p.classList.add("active");
      render(p.dataset.role, document.getElementById("searchInput").value);
    }));
    document.getElementById("searchInput").addEventListener("input", (e) => render(document.querySelector(".sort-pill.active").dataset.role, e.target.value));
  }
</script>
</body>
</html>
