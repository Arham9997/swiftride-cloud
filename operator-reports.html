<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports & Revenue — SwiftRide Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/dashboard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<div class="dash-shell">
  <div id="sr-dash-sidebar-mount"></div>

  <main class="dash-main">
    <div class="dash-topbar">
      <div><h1>Reports & Revenue</h1><div class="sub">Performance across routes and time periods.</div></div>
      <button class="btn btn-outline" id="exportBtn"><i class="fa-solid fa-download"></i> Export CSV</button>
    </div>

    <div class="dash-panel">
      <div class="panel-head"><h3><i class="fa-solid fa-chart-column text-orange"></i> Monthly Revenue Trend</h3></div>
      <canvas id="monthlyChart" height="100"></canvas>
    </div>

    <div class="grid" style="grid-template-columns: 1fr 1fr; gap:24px;">
      <div class="dash-panel">
        <div class="panel-head"><h3><i class="fa-solid fa-route text-orange"></i> Top Routes by Revenue</h3></div>
        <div id="topRoutes"></div>
      </div>
      <div class="dash-panel">
        <div class="panel-head"><h3><i class="fa-solid fa-chair text-orange"></i> Occupancy Rate</h3></div>
        <canvas id="occupancyChart" height="180"></canvas>
      </div>
    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/app.js"></script>
<script>
  const session = srRequireAuth();
  if (session) {
    srRenderDashSidebar("operator", "reports");

    new Chart(document.getElementById("monthlyChart"), {
      type: 'bar',
      data: {
        labels: ['Jan','Feb','Mar','Apr','May','Jun'],
        datasets: [{ label: 'Revenue (₹ Lakhs)', data: [7.2, 6.8, 8.1, 8.9, 9.0, 9.4], backgroundColor: '#FF8A00', borderRadius: 6 }]
      },
      options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });

    new Chart(document.getElementById("occupancyChart"), {
      type: 'doughnut',
      data: { labels: ['Occupied', 'Vacant'], datasets: [{ data: [76, 24], backgroundColor: ['#0B1F3A', '#EEF2F7'] }] },
      options: { plugins: { legend: { position: 'bottom' } } }
    });

    const topRoutes = [
      { route: "Mumbai → Pune", revenue: 312000, trips: 186 },
      { route: "Mumbai → Goa", revenue: 248000, trips: 64 },
      { route: "Pune → Hyderabad", revenue: 190500, trips: 78 },
      { route: "Mumbai → Ahmedabad", revenue: 152000, trips: 92 },
    ];
    document.getElementById("topRoutes").innerHTML = topRoutes.map(r => `
      <div class="trip-row" style="grid-template-columns: 1fr auto auto;">
        <div><div class="route-txt">${r.route}</div><div class="meta-txt">${r.trips} trips this month</div></div>
        <span class="mono" style="font-weight:700; color:var(--orange-600);">${srFormatCurrency(r.revenue)}</span>
      </div>`).join("");

    document.getElementById("exportBtn").addEventListener("click", () => {
      srToast("Report export started (demo)", "success");
    });
  }
</script>
</body>
</html>
