<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Bookings — SwiftRide Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dash-shell">
  <div id="sr-dash-sidebar-mount"></div>

  <main class="dash-main">
    <div class="dash-topbar">
      <div><h1>Passenger Bookings</h1><div class="sub">All bookings across your fleet.</div></div>
      <div class="input-icon-wrap" style="width:240px;"><i class="fa-solid fa-magnifying-glass"></i><input class="input" id="searchInput" placeholder="Search booking ID or name"></div>
    </div>

    <div class="dash-panel">
      <div class="table-wrap">
        <table class="dash-table">
          <thead><tr><th>Booking ID</th><th>Route</th><th>Passenger</th><th>Date</th><th>Seats</th><th>Amount</th><th>Status</th></tr></thead>
          <tbody id="bookingsBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/app.js"></script>
<script>
  const session = srRequireAuth();
  if (session) {
    srRenderDashSidebar("operator", "bookings");

    const allBookings = [
      { id: "SRC88421019", route: "Mumbai → Pune", pax: "Aarav Mehta", date: "Jun 24, 2026", seats: "A4", amount: 890, status: "confirmed" },
      { id: "SRC88420877", route: "Mumbai → Pune", pax: "Sneha Iyer", date: "Jun 24, 2026", seats: "B2, B3", amount: 1640, status: "confirmed" },
      { id: "SRC88419502", route: "Pune → Mumbai", pax: "Rohan Kulkarni", date: "Jun 23, 2026", seats: "C1", amount: 720, status: "cancelled" },
      { id: "SRC88418311", route: "Mumbai → Pune", pax: "Priya Nair", date: "Jun 22, 2026", seats: "A1", amount: 890, status: "confirmed" },
      { id: "SRC88417004", route: "Mumbai → Goa", pax: "Vikram Singh", date: "Jun 21, 2026", seats: "L3, L4", amount: 2300, status: "confirmed" },
      { id: "SRC88415890", route: "Pune → Hyderabad", pax: "Anjali Desai", date: "Jun 20, 2026", seats: "D2", amount: 980, status: "completed" },
    ];

    function render(filter) {
      const f = filter.toLowerCase();
      const filtered = allBookings.filter(b => b.id.toLowerCase().includes(f) || b.pax.toLowerCase().includes(f));
      document.getElementById("bookingsBody").innerHTML = filtered.map(b => `
        <tr>
          <td class="mono">${b.id}</td><td>${b.route}</td><td>${b.pax}</td><td>${b.date}</td>
          <td class="mono">${b.seats}</td><td class="mono">${srFormatCurrency(b.amount)}</td>
          <td><span class="badge ${b.status === 'confirmed' ? 'badge-success' : b.status === 'cancelled' ? 'badge-danger' : 'badge-navy'}">${b.status}</span></td>
        </tr>`).join("") || `<tr><td colspan="7" style="text-align:center; color:var(--ink-500); padding:30px;">No bookings match your search</td></tr>`;
    }
    render("");
    document.getElementById("searchInput").addEventListener("input", (e) => render(e.target.value));
  }
</script>
</body>
</html>
